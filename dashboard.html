<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Audits - LinkedIn Deal Magnet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        linkedin: {
                            blue: '#0077B5',
                            dark: '#004182',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-b from-blue-50 via-white to-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-linkedin-blue" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                    <span class="ml-2 text-xl font-bold text-gray-900">Deal Magnet</span>
                </div>
                <div class="hidden md:flex items-center space-x-6">
                    <a href="/" class="text-gray-600 hover:text-linkedin-blue transition">Home</a>
                    <a href="/onboarding" class="text-linkedin-blue font-semibold">New Audit</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="py-16">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-8">My LinkedIn Audits</h1>

            <!-- Email Input -->
            <div id="email-input-section" class="bg-white rounded-2xl shadow-lg p-8 mb-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-4">View Your Audits</h2>
                <p class="text-gray-600 mb-6">Enter your email to see all your profile audits</p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <input
                        type="email"
                        id="email-input"
                        placeholder="your@email.com"
                        class="flex-1 px-6 py-4 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-linkedin-blue focus:border-transparent text-lg"
                    />
                    <button
                        onclick="loadAudits()"
                        class="bg-linkedin-blue hover:bg-linkedin-dark text-white font-bold px-8 py-4 rounded-lg transition duration-200 text-lg shadow-lg hover:shadow-xl"
                    >
                        View My Audits
                    </button>
                </div>
                <p id="error-message" class="text-red-600 mt-4 hidden"></p>
            </div>

            <!-- Audits List -->
            <div id="audits-section" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">Your Audits</h2>
                    <a href="/onboarding" class="bg-linkedin-blue hover:bg-linkedin-dark text-white font-semibold px-6 py-3 rounded-lg transition">
                        + New Audit
                    </a>
                </div>
                <div id="audits-list" class="space-y-4">
                    <!-- Audits will be rendered here -->
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading-state" class="hidden text-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-linkedin-blue mx-auto mb-4"></div>
                <p class="text-gray-600">Loading your audits...</p>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden bg-white rounded-2xl shadow-lg p-12 text-center">
                <svg class="w-24 h-24 text-gray-300 mx-auto mb-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <h3 class="text-2xl font-bold text-gray-900 mb-4">No audits found</h3>
                <p class="text-gray-600 mb-8">Get started by running your first LinkedIn profile audit!</p>
                <a href="/onboarding" class="inline-block bg-linkedin-blue hover:bg-linkedin-dark text-white font-bold px-8 py-4 rounded-lg transition">
                    Run Your First Audit
                </a>
            </div>
        </div>
    </section>

    <script>
        let currentEmail = null;

        // Check if email in URL params
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            if (email) {
                document.getElementById('email-input').value = email;
                loadAudits();
            }
        });

        async function loadAudits() {
            const emailInput = document.getElementById('email-input');
            const email = emailInput.value.trim();
            const errorMessage = document.getElementById('error-message');

            if (!email || !email.includes('@')) {
                errorMessage.textContent = 'Please enter a valid email address';
                errorMessage.classList.remove('hidden');
                return;
            }

            errorMessage.classList.add('hidden');
            currentEmail = email;

            // Show loading
            document.getElementById('email-input-section').classList.add('hidden');
            document.getElementById('loading-state').classList.remove('hidden');

            try {
                // Fetch audits from API (using email to filter)
                // For now, we'll use a simple approach - in production, add proper auth
                const response = await fetch(`/api/audits-by-email?email=${encodeURIComponent(email)}`);
                const data = await response.json();

                document.getElementById('loading-state').classList.add('hidden');

                if (!data.success || data.audits.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                } else {
                    renderAudits(data.audits);
                    document.getElementById('audits-section').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Failed to load audits:', error);
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('email-input-section').classList.remove('hidden');
                errorMessage.textContent = 'Failed to load audits. Please try again.';
                errorMessage.classList.remove('hidden');
            }
        }

        function renderAudits(audits) {
            const list = document.getElementById('audits-list');
            list.innerHTML = audits.map(audit => {
                const date = new Date(audit.created_at).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const scoreColor = audit.score >= 80 ? 'text-green-600' :
                                   audit.score >= 60 ? 'text-blue-600' :
                                   audit.score >= 40 ? 'text-yellow-600' : 'text-red-600';

                return `
                    <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-900">Profile Audit</h3>
                                <p class="text-gray-500 text-sm">${date}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-4xl font-bold ${scoreColor}">${audit.score}</div>
                                <div class="text-sm text-gray-600">${audit.score_label}</div>
                            </div>
                        </div>
                        <div class="border-t pt-4 flex justify-between items-center">
                            <div class="text-sm text-gray-600">
                                ${audit.is_paid ? '<span class="text-green-600 font-semibold">✓ Paid</span>' : '<span class="text-gray-500">Free Audit</span>'}
                            </div>
                            <button onclick="viewAudit('${audit.id}')" class="bg-linkedin-blue hover:bg-linkedin-dark text-white font-semibold px-6 py-2 rounded-lg transition">
                                View Details
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewAudit(auditId) {
            window.location.href = `/onboarding?audit=${auditId}&email=${encodeURIComponent(currentEmail)}`;
        }
    </script>
</body>
</html>
